<div class="app-layout">
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">{{ 'header.title' | translate }}</h1>
      <p class="header-subtitle">{{ 'header.subtitle' | translate }}</p>
    </div>
    <div class="header-right">
      <button class="language-btn" (click)="toggleLanguage()">
        {{ currentLanguage() === 'es' ? 'ES' : 'EN' }}
      </button>
      <img
        class="nasa-logo"
        src="assets/logo-nasa.png" alt="Logo de la NASA"/>
    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p>{{ 'footer.name' | translate }}</p>
    <p>{{ 'footer.company' | translate }}</p>
  </footer>
</div>
