<section class="dashboard-shell">
  @if (loading()) {
    <p class="status">{{ 'dashboard.loading' | translate }}</p>
  }

  @if (!loading() && errorMessage()) {
    <p class="status error">{{ errorMessage() }}</p>
  }

  @if (!loading() && !errorMessage()) {
    <div class="search-container">
      <input
        type="text"
        class="search-input"
        [placeholder]="'dashboard.searchPlaceholder' | translate"
        [value]="searchText()"
        (input)="onSearchTextChange($any($event.target).value)"
      />
    </div>

    @if (apods().length > 0) {
      <div class="grid">
        @for (item of apods(); track item.date) {
          <app-dashboard-card [item]="item"></app-dashboard-card>
        }
      </div>
    } @else {
      <p class="no-results">{{ 'dashboard.noResults' | translate }}</p>
    }
  }
</section>
