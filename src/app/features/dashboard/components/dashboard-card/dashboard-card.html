<article class="card" [routerLink]="['/detail', item.date]">
  <div class="card-topline">
    <span class="tag">APOD</span>
    <p class="date">{{ item.date | spanishDate }}</p>
  </div>

  @if (!imageFailed()) {
    <div class="media-frame">
      <img
        [src]="item.url"
        [alt]="item.title"
        (error)="handleImageError()"
      />
    </div>
  } @else {
    <div class="media-frame image-placeholder">
      No se pudo cargar la imagen
    </div>
  }

  <div class="card-body">
    <h2>{{ item.title }}</h2>
    <p class="excerpt">{{ item.explanation }}</p>
  </div>
</article>
